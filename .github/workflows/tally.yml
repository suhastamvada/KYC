name: Tally proposal votes

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write
  discussions: read

jobs:
  tally:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch proposal discussions and write data/proposals.json
        uses: actions/github-script@v7
        with:
          script: |
            const query = `
              query($owner: String!, $repo: String!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  discussions(first: 50, after: $cursor, categoryId: null) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      title
                      url
                      number
                      createdAt
                      category { name }
                      comments { totalCount }
                      reactionGroups {
                        content
                        reactors { totalCount }
                      }
                    }
                  }
                }
              }`;
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            let cursor = null, all = [];
            do {
              const res = await github.graphql(query, { owner, repo, cursor });
              const d = res.repository.discussions;
              all.push(...d.nodes);
              cursor = d.pageInfo.hasNextPage ? d.pageInfo.endCursor : null;
            } while (cursor);

            const proposals = all
              .filter(n => n.category && n.category.name === "Proposals")
              .map(n => {
                const get = c => {
                  const g = n.reactionGroups.find(r => r.content === c);
                  return g ? g.reactors.totalCount : 0;
                };
                return {
                  title: n.title,
                  url: n.url,
                  number: n.number,
                  createdAt: n.createdAt,
                  comments: n.comments.totalCount,
                  up: get("THUMBS_UP"),
                  down: get("THUMBS_DOWN"),
                  net: get("THUMBS_UP") - get("THUMBS_DOWN"),
                };
              })
              .sort((a, b) => b.net - a.net);

            const fs = require("fs");
            fs.mkdirSync("data", { recursive: true });
            fs.writeFileSync(
              "data/proposals.json",
              JSON.stringify(
                { generatedAt: new Date().toISOString(), proposals },
                null,
                2
              ) + "\n"
            );

      - name: Commit if changed
        run: |
          git config user.name "vote-tally-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/proposals.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update vote tally"
            git push
          fi
